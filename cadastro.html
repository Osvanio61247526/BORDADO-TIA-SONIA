<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href=cadastro.css>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>cadastro</title>
</head>

<body>
   <header>
         <nav class="area-navegacao"> 
            <img class="logo" src="img/logo-tia-sonia.png" alt="logo do site" width="150px">
            <ul>

                <li><a class="icones" href="index.html"><i class="fa-solid fa-house-user"></i></a></li>
                <li><a class="icones" href="index.html"><i class="fa-solid fa-scissors"></i></a></li>
                <li> <a class="icones" href="#"><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li><a class="icones" href="login.html"><i class="fa-solid fa-address-book"></i></a></li>


            </ul>

        </nav>
    </header>
    <main class="area-cadastro">
        <section class="area-formulario">
            <h1>cadastre-se</h1>
        </section>
        <section class="area-formulario">
            <form action="#" class="form-cadastro">
                <div class="area-nome formatacao">
                    <div class="primeiro-nome titulo-campo">
                        <label for="nome">nome</label>
                        <input type="text" id="nome" placeholder="digit seu nome" required>
                    </div>
                    <div class="utimo-nome titulo-campo">
                        <label for="sobrenome">sobrenome</label>
                        <input type="text" id="sobrenome" placeholder="digite seu sobrenome">
                    </div>
                </div>
                <div class="area-acesso formatacao">
                    <div class="email titulo-campo">
                        <label for="email">email</label>
                        <input type="email" id="email" placeholder="digite seu email" required>
                    </div>
                    <div class="senha titulo-campo">
                        <label for="senha">senha</label>
                        <input type="password" id="senha" placeholder="●●●●●●●●" required>
                    </div>
                </div>
                <div class="area-contato formatacao">
                    <div class="ddd titulo-campo titulo-campo">
                        <label for="ddd">ddd</label>
                        <input type="number" max="99" id="ddd" placeholder="ddd" required>
                    </div>
                    <div class="telefone titulo-campo">
                        <label for="telefone">telefone</label>
                        <input type="text" id="telefone" placeholder="digite seu telefone" required>
                    </div>
                </div>


                <div class="area-endereco">
                    <div class="endereco-numero formatacao">
                        <div class="endereco titulo-campo">
                            <label for="endereco">endereco</label>
                            <input type="text" id="endereco" placeholder="digite seu endereco">
                        </div>
                        <div class="numero titulo-campo">
                            <label for="numero">número</label>
                            <input type="number" id="numero" placeholder="000">
                        </div>

                    </div>

                    <div class="cidade-cep formatacao">
                        <div class="cidade titulo-campo">
                            <label for="cidade">cidade</label>
                            <input type="text" id="cidade" placeholder="cidade">
                        </div>
                        <div class="cep titulo-campo">
                            <label for="cep">cep</label>
                            <input type="text" id="cep" placeholder="00000-000">
                        </div>

                    </div>


                </div>
                <div class="area-dados formatacao">
                    <div class="data-nacimento titulo-campo ">
                        <label for="data-nacimento">data de nacimento</label>
                        <input type="date" id="data-nacimento" required>

                    </div>
                    <div class="genero titulo-campo">
                        <label for="genero">genero</label>
                        <select id="genero" required>
                            <option value="#" disabled selected>selecione seu gênero</option>
                            <option value="#">feminino</option>
                            <option value="#">masculino</option>
                            <option value="#">outros</option>
                            <option value="#">prefiro não responder</option>

                        </select>
                    </div>
                </div>
                <div class="area-botao formatacao">
                    <button type="submit" id="botao-cadastrar"> cadastrar</button>
                    <a href="login.html" class="link-login"> Já possui uma conta? Acesse!</a>
                </div>

            </form>
        </section>
    </main>

</body>

</html>
