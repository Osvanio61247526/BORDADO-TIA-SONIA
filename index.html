<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Bordado tia sonia </title>
</head>
<body>
    <header>
        <nav>
            <img src="img/logo-tia-sonia.png" alt="logo do site"width="150px">
            <ul>
            
                <li><a class="icones" href="#"><i class="fa-solid fa-house-user"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-scissors"></i></a></li>
                <li> <a class="icones" href="#"><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-address-book"></i></a></li>
            

            </ul>

        </nav>
    </header>
    <main>
        <article class="area-baner">
            <section id="banner"> 
                <img src="img/banner.png" alt="banner bordado da tia sonia" id="banner__image">

            </section>


            <section id="reservas">
                <h2 id="resevas__titulo">vagas na agenda da semana:3 disponivel</h2>
                <button id="reservas__botao"> reservas vasgas</button>   
            </section>
        </article>


        <article class="area-sobre">

            <section class="sobre">
                <h1 class="sobre__titulo">conheca a tia sônia </h1>
                <p class="sobre__texto">
                     A  tia sônia esta super feliz em ter você por aqui.
                     Ela borda todos os dias e ama o que faz,
                    se você gosta de bordados como ela, ou conhece alguém  que amaria receber um bordado, visite o seu catálogo  e faca reservas

                </p>

            </section>
            <sectionc class="sobre">
                <img class="sobre__foto" src="img/tia-sonia.png" alt="mulher com cabelos grisalhos em jardim de rosas.">

            </section>
        </article>
    </main>
    
</body>
</html>
